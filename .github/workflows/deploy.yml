name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages || true
          git worktree add gh-pages-worktree gh-pages || git worktree add --orphan gh-pages-worktree gh-pages
          rm -rf gh-pages-worktree/*
          cp -R dist/. gh-pages-worktree/
          touch gh-pages-worktree/.nojekyll
          cd gh-pages-worktree
          git add -A
          git commit -m "Deploy built site" || exit 0
          git push origin gh-pages
